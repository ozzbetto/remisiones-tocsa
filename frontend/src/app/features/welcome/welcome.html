<div class="d-flex flex-column align-items-center justify-content-center py-5">
  <p-card styleClass="shadow-sm border-round text-center p-4">
    <ng-template pTemplate="header">
      <i class="pi pi-desktop text-primary" style="font-size: 4rem; margin-top: 1rem;"></i>
    </ng-template>
    
    <h1 class="mb-3">Emisión de Remisiones TI</h1>
    <p class="text-secondary mb-4" style="max-width: 500px; margin: 0 auto;">
      Plataforma de gestión y control de remisiones de equipos informáticos de TOCSA S.A.
    </p>
    
    <ng-template pTemplate="footer">
      <div class="d-flex justify-content-center gap-3">
        <p-button label="Ver Remisiones" icon="pi pi-list" routerLink="/remisiones" severity="primary"></p-button>
        <p-button label="Crear Nueva" icon="pi pi-plus" routerLink="/remisiones/nuevo" severity="secondary" [outlined]="true"></p-button>
      </div>
    </ng-template>
  </p-card>
</div>
