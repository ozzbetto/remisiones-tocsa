version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/remisiones-db
      - INVGATE_API_URL=https://tocsa.is.cloud.invgate.net/public-api
      - INVGATE_CLIENT_ID=IEMeJ672gnGKFSQfiitIUeXQ7FtNUtZhQJvpnCeN
      - INVGATE_CLIENT_SECRET=noDbRQQZ7B8kmXdsv2Rn7zlwq9QJbER0DccM8fMDKAJl2JjGQoON4pko5iAPdB6HSzDeg9TbhIpWYMNsWTqBZ5J9iU7Tlut1sGb4xpZRyZ7MrekGxkLurLOLEMqYeu2H
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
